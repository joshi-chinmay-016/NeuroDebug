# ──────────────────────────────────────────────────────────────────
# NeuroDebug — Docker Compose
# Services: backend (FastAPI) + frontend (React/nginx)
# ──────────────────────────────────────────────────────────────────

services:
  # ── Backend: FastAPI ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurodebug_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - neurodebug_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend: React + nginx ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurodebug_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - neurodebug_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Shared network ────────────────────────────────────────────────
networks:
  neurodebug_net:
    driver: bridge
